name: Publish CLI

on:
  release:
    types: [published]
  workflow_dispatch:
    # Runs the build/package steps only, without uploading release assets or
    # publishing to npm — use this to validate the cross-platform build
    # matrix before cutting a real release.

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build & Publish (${{ matrix.npm-pkg }})
    runs-on: ${{ matrix.os }}
    # Only gate real releases behind the environment's approval/OIDC setup —
    # workflow_dispatch is used to validate the build matrix from any branch
    # and shouldn't have to wait on environment approval just to compile.
    environment: ${{ github.event_name == 'release' && 'npm-publish' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            npm-pkg: win32-x64
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            npm-pkg: linux-x64
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            npm-pkg: darwin-x64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            npm-pkg: darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Build wx CLI
        run: cargo build --release --manifest-path crates/wx-cli/Cargo.toml --target ${{ matrix.rust-target }}

      - name: Stage Binary
        shell: bash
        run: |
          mkdir -p cli/npm/${{ matrix.npm-pkg }}/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.rust-target }}/release/wx.exe cli/npm/${{ matrix.npm-pkg }}/bin/wx.exe
          else
            cp target/${{ matrix.rust-target }}/release/wx cli/npm/${{ matrix.npm-pkg }}/bin/wx
          fi

      - name: Package Archive
        id: package
        shell: bash
        run: |
          bin_name="wx"
          [ "${{ matrix.os }}" = "windows-latest" ] && bin_name="wx.exe"
          cd "cli/npm/${{ matrix.npm-pkg }}/bin"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            archive="wx-${{ matrix.rust-target }}.zip"
            7z a "$archive" "$bin_name"
          else
            archive="wx-${{ matrix.rust-target }}.tar.gz"
            tar -czf "$archive" "$bin_name"
          fi
          mv "$archive" "$GITHUB_WORKSPACE/$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.archive }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for OIDC support
        if: github.event_name == 'release'
        run: npm install -g npm@latest # trusted publishing needs npm 11.5.1+

      # Idempotent: if a previous run already published this exact
      # name@version (e.g. a retry after a later step failed), skip instead
      # of failing the whole job on npm's "cannot publish over previously
      # published version" error.
      - name: Publish Platform Package
        if: github.event_name == 'release'
        working-directory: cli/npm/${{ matrix.npm-pkg }}
        shell: bash
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "$pkg_name@$pkg_version" version >/dev/null 2>&1; then
            echo "$pkg_name@$pkg_version already published, skipping"
          else
            npm publish --access public
          fi
        # No NODE_AUTH_TOKEN — trusted publishing authenticates via this
        # job's OIDC token (id-token: write) matched against the Trusted
        # Publisher config on npmjs.com for this package.

  publish-main:
    name: Publish @wx-lang/cli
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Update npm for OIDC support
        run: npm install -g npm@latest # trusted publishing needs npm 11.5.1+

      - name: Install dependencies
        # Scoped to just this package: a full workspace install would also
        # try to install web-next, which depends on locally wasm-pack-built
        # packages (crates/wx-*-wasm/pkg) that don't exist in this workflow.
        run: pnpm install --frozen-lockfile --filter @wx-lang/cli

      # cli/package.json references the platform packages via "workspace:*";
      # `pnpm publish` rewrites those to real version numbers, which plain
      # `npm publish` cannot do.
      - name: Publish
        working-directory: cli
        run: pnpm publish --access public --no-git-checks
        # No NODE_AUTH_TOKEN — relies on OIDC trusted publishing. A token
        # here would make npm/pnpm skip OIDC entirely and auth with it
        # instead, so it can't coexist with actually testing/using OIDC.

name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    # Runs the build/package step only, without publishing to the
    # Marketplace — use this to validate packaging before cutting a release.

jobs:
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        # Scoped to just this package: a full workspace install would also
        # try to install web-next, which depends on locally wasm-pack-built
        # packages (crates/wx-*-wasm/pkg) that don't exist in this workflow.
        run: pnpm install --frozen-lockfile --filter wx-vscode

      - name: Package VS Code Extension
        working-directory: ./vscode
        # No `--target`: the extension no longer bundles a native binary (it
        # resolves `wx` from the user's PATH, same as `deno.path`), so a
        # single platform-independent .vsix covers everyone.
        # --no-dependencies: the extension is bundled via tsdown, so vsce's
        # npm-based node_modules dependency check is both unnecessary and
        # broken under pnpm's symlinked node_modules layout.
        run: npx @vscode/vsce package --no-dependencies --out wx-vscode.vsix

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: "vscode/*.vsix"

  publish:
    name: Publish to Marketplace
    needs: build-and-package
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix
          path: artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath artifacts/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
